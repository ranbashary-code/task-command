<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת המשימות</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --violet: #2BB5A3;
  --violet-soft: #E6FAF7;
  --red: #F43F5E;
  --amber: #FFCF6E;
  --blue: #42B4E6;
  --green: #42E6D2;
  --slate: #94A3B8;
  --coral: #FF8E72;
  --gold: #FFCB6B;
  --mint: #42E6D2;
}
[data-theme="light"] {
  --canvas: #F7FAFA; --surface: #FFFFFF; --surface-alt: #F0F6F5;
  --border: #D9E8E5; --border-soft: #E8F0EE;
  --text: #1A2C2A; --text-soft: #3D5654; --text-mute: #8CA3A0;
  --banner-bg: #FFFFFF; --input-bg: #FFFFFF; --drill-bg: #E6FAF7;
  --overlay: rgba(0,0,0,.35); --shadow: rgba(26,44,42,.12);
}
[data-theme="dark"] {
  --canvas: #2B1B52; --surface: rgba(20,10,45,0.55); --surface-alt: rgba(30,18,58,0.4);
  --border: rgba(255,255,255,0.13); --border-soft: rgba(255,255,255,0.07);
  --text: #F7F3FC; --text-soft: #D4C8ED; --text-mute: #A898C8;
  --banner-bg: rgba(30,15,55,0.82); --input-bg: rgba(20,10,45,0.6); --drill-bg: rgba(255,142,114,0.1);
  --overlay: rgba(0,0,0,.55); --shadow: rgba(0,0,0,.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Rubik', 'Heebo', system-ui, sans-serif;
  background: var(--canvas); color: var(--text);
  min-height: 100vh; font-size: 15px;
  transition: background .3s, color .3s;
}
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
input, select, textarea, button { font-family: inherit; color: inherit; }
button { cursor: pointer; border: none; background: none; }
a { color: var(--violet); text-decoration: none; }

/* LOGIN */
.login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #2B1B52 0%, #361F63 52%, #4A2A7A 100%);
}
[data-theme="dark"] .login-screen { background: transparent; }
.login-card {
  background: #FFFFFF; border-radius: 24px; padding: 48px 40px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.3); max-width: 400px; width: 90%; color: #1A2C2A;
}
.login-card h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
.login-card p { color: #3D5654; margin-bottom: 32px; font-size: 14px; }
.login-logo {
  width: 64px; height: 64px; border-radius: 18px; background: linear-gradient(135deg, #2BB5A3 0%, #42E6D2 100%);
  display: grid; place-items: center; color: #fff; font-size: 28px; font-weight: 800;
  margin: 0 auto 20px; box-shadow: 0 8px 24px rgba(43,181,163,.35);
}
.btn-google {
  display: inline-flex; align-items: center; gap: 10px; padding: 12px 28px;
  background: linear-gradient(120deg, #FF8E72 0%, #FFCB6B 100%); color: #1A2C2A; border-radius: 14px; font-weight: 700;
  font-size: 15px; transition: .2s;
}
.btn-google:hover { filter: brightness(1.1); transform: translateY(-1px); }
.login-error { color: var(--red); font-size: 13px; margin-top: 16px; }

/* BANNER */
.banner {
  position: sticky; top: 0; z-index: 30; background: var(--banner-bg);
  border-bottom: 1px solid var(--border); padding: 10px 24px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  transition: background .3s, border-color .3s;
}
.brand { display: flex; align-items: center; gap: 10px; margin-left: 8px; }
.brand-icon {
  width: 36px; height: 36px; border-radius: 12px; background: linear-gradient(135deg, #2BB5A3 0%, #42E6D2 100%);
  display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 16px;
  box-shadow: 0 4px 12px rgba(43,181,163,.3);
}
.brand-name { font-weight: 700; font-size: 14px; }
.brand-sub { font-size: 11px; color: var(--text-mute); }
.nav-tabs {
  display: flex; gap: 4px; padding: 4px; border-radius: 14px; background: var(--surface-alt);
}
.nav-tab {
  display: flex; align-items: center; gap: 6px; padding: 7px 14px;
  border-radius: 10px; font-size: 13px; font-weight: 500; transition: .2s;
  color: var(--text-soft);
}
.nav-tab.active { background: var(--violet); color: #fff; font-weight: 600; }
.nav-tab:hover:not(.active) { background: var(--border-soft); }
.spacer { flex: 1; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center;
  background: var(--surface-alt); border: 1px solid var(--border); position: relative;
  transition: .2s;
}
.icon-btn:hover { background: var(--border-soft); }
.badge {
  position: absolute; top: -4px; left: -4px; width: 16px; height: 16px;
  border-radius: 50%; background: var(--red); color: #fff; font-size: 10px;
  display: grid; place-items: center; font-weight: 600;
}
.btn-primary {
  display: flex; align-items: center; gap: 6px; padding: 8px 16px;
  background: linear-gradient(120deg, #2BB5A3 0%, #42E6D2 100%); color: #fff; border-radius: 12px; font-weight: 600;
  font-size: 13px; transition: .2s; box-shadow: 0 2px 8px rgba(43,181,163,.25);
}
.btn-primary:hover { filter: brightness(1.1); }
.search-box {
  position: relative; display: flex; align-items: center;
}
.search-box input {
  width: 180px; padding: 8px 32px 8px 12px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--input-bg); font-size: 13px; outline: none; transition: .2s;
}
.search-box input:focus { border-color: var(--violet); box-shadow: 0 0 0 3px rgba(124,92,252,.15); }
.search-box svg { position: absolute; right: 10px; color: var(--text-mute); }
.avatar {
  width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center;
  color: #fff; font-weight: 600; font-size: 14px; flex-shrink: 0;
}
.avatar-sm { width: 24px; height: 24px; font-size: 10px; }

/* MAIN */
.main { padding: 28px; max-width: 1300px; margin: 0 auto; }
.page-title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.page-sub { color: var(--text-soft); font-size: 14px; margin-bottom: 20px; }

/* CARDS */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  transition: background .3s, border-color .3s;
}
.card-head {
  padding: 14px 20px; font-weight: 600; font-size: 14px;
  border-bottom: 1px solid var(--border-soft);
  display: flex; align-items: center; gap: 8px;
}

/* STAT CARDS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card {
  padding: 16px; border-radius: 16px; background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; transition: .2s; text-align: right;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px var(--shadow); }
.stat-card.active { border-width: 2px; }
.stat-top { display: flex; align-items: center; justify-content: space-between; }
.stat-num { font-size: 26px; font-weight: 800; }
.stat-label { font-size: 12px; color: var(--text-mute); margin-top: 4px; }

/* CHARTS */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
@media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
.chart-card { padding: 20px; }
.chart-title { font-weight: 600; margin-bottom: 4px; }
.chart-sub { font-size: 12px; color: var(--text-mute); margin-bottom: 12px; }
canvas { max-height: 200px; }

/* DRILL */
.drill-panel { border-color: var(--violet) !important; margin-bottom: 20px; }
.drill-head {
  padding: 12px 20px; background: var(--drill-bg); font-size: 13px; font-weight: 600;
  display: flex; justify-content: space-between; align-items: center;
}

/* TASK ROW */
.task-row {
  display: flex; align-items: center; gap: 12px; padding: 12px 20px;
  border-top: 1px solid var(--border-soft); cursor: pointer; transition: .15s;
}
.task-row:first-child { border-top: none; }
.task-row:hover { background: var(--surface-alt); }
.task-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.task-info { flex: 1; min-width: 0; }
.task-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-title.done { text-decoration: line-through; color: var(--text-mute); }
.task-cat { font-size: 12px; color: var(--text-mute); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
.pill {
  display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px;
  border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap;
}
.task-due { font-size: 12px; display: flex; align-items: center; gap: 4px; min-width: 110px; justify-content: flex-end; white-space: nowrap; }
.task-avatars { display: flex; gap: -6px; width: 60px; justify-content: flex-end; }
.task-avatars .avatar-sm { margin-inline-start: -6px; border: 2px solid var(--surface); }

/* KANBAN */
.kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 900px) { .kanban { grid-template-columns: repeat(2, 1fr); } }
.kanban-col { border-radius: 16px; background: var(--surface); border: 1px solid var(--border); padding: 10px; min-height: 400px; }
.kanban-col-head { display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin-bottom: 8px; font-weight: 600; font-size: 13px; }
.kanban-card {
  border-radius: 12px; padding: 12px; background: var(--surface-alt); border: 1px solid var(--border);
  border-right: 3px solid; margin-bottom: 8px; cursor: grab; transition: .2s;
}
.kanban-card:hover { box-shadow: 0 4px 12px var(--shadow); }
.kanban-card[draggable="true"]:active { cursor: grabbing; opacity: .7; }
.kanban-card-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
.kanban-card-foot { display: flex; justify-content: space-between; align-items: center; }

/* CALENDAR */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-head { text-align: center; padding: 10px; font-size: 12px; font-weight: 600; color: var(--text-mute); }
.cal-cell { min-height: 90px; padding: 6px; border-bottom: 1px solid var(--border-soft); border-left: 1px solid var(--border-soft); }
.cal-day { font-size: 12px; font-weight: 600; width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; margin-bottom: 4px; }
.cal-day.today { background: linear-gradient(135deg, #FF8E72, #FFCB6B); color: #1A2C2A; font-weight: 800; box-shadow: 0 2px 8px rgba(255,142,114,.4); }
.cal-task {
  font-size: 11px; padding: 2px 6px; border-radius: 4px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;
  cursor: pointer;
}
.cal-event {
  background: linear-gradient(120deg, rgba(255,142,114,0.15), rgba(255,203,107,0.15)) !important;
  color: var(--coral) !important; border-right: 2px solid var(--coral);
  cursor: default;
}
.cal-column { border-left: 1px solid var(--border-soft); }
.cal-column:last-child { border-left: none; }
.cal-col-item {
  font-size: 12px; padding: 6px 8px; border-radius: 6px; margin-bottom: 4px;
  background: var(--surface-alt); border: 1px solid var(--border-soft);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* BOTTOM GRID */
.bottom-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
@media (max-width: 900px) { .bottom-grid { grid-template-columns: 1fr; } }
.activity-item { display: flex; gap: 10px; font-size: 13px; margin-bottom: 12px; }
.activity-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--violet); margin-top: 8px; flex-shrink: 0; }
.activity-time { font-size: 11px; color: var(--text-mute); }

/* FILTER BAR */
.filter-bar { display: flex; gap: 4px; padding: 4px; border-radius: 14px; background: var(--surface-alt); border: 1px solid var(--border); }
.filter-btn { padding: 6px 14px; border-radius: 10px; font-size: 13px; font-weight: 500; transition: .2s; color: var(--text-soft); }
.filter-btn.active { background: var(--violet); color: #fff; }
.filters-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
.filter-group { display: flex; align-items: center; gap: 4px; }
.filter-label { font-size: 11px; font-weight: 600; color: var(--text-mute); margin-left: 4px; }
.filter-select {
  padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--input-bg); font-size: 12px; color: var(--text); outline: none;
}

/* CAT SECTION */
.cat-section { margin-bottom: 12px; }
.cat-head {
  display: flex; align-items: center; gap: 10px; padding: 14px 20px; cursor: pointer;
  font-weight: 600;
}
.cat-dot { width: 12px; height: 12px; border-radius: 4px; }
.cat-count { font-size: 12px; color: var(--text-mute); margin-right: auto; }
.subtask-list { padding: 0 56px 10px 20px; }
.subtask { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-soft); margin-bottom: 4px; cursor: pointer; }
.subtask-box {
  width: 16px; height: 16px; border-radius: 4px; display: grid; place-items: center;
  border: 1px solid var(--border); flex-shrink: 0;
}
.subtask-box.checked { background: rgba(16,185,129,.15); border-color: var(--green); }

/* MODAL/DRAWER */
.modal-overlay { position: fixed; inset: 0; background: var(--overlay); z-index: 40; display: none; }
.modal-overlay.open { display: flex; }
.drawer {
  width: 440px; max-width: 100%; height: 100%; background: var(--surface);
  overflow-y: auto; box-shadow: -10px 0 40px rgba(0,0,0,.3);
  margin-right: auto;
}
.drawer-head {
  padding: 16px 24px; border-bottom: 1px solid var(--border-soft);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.drawer-head input {
  font-size: 18px; font-weight: 700; flex: 1; background: transparent; border: none; outline: none;
}
.drawer-body { padding: 24px; }
.field { margin-bottom: 20px; }
.field-label { font-size: 12px; font-weight: 600; color: var(--text-mute); margin-bottom: 6px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.input {
  width: 100%; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--input-bg); font-size: 13px; outline: none; transition: .2s;
}
.input:focus { border-color: var(--violet); }
select.input { appearance: auto; }
textarea.input { resize: none; min-height: 70px; }
.tag-list { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.tag-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 12px 3px 4px; border-radius: 20px; background: var(--surface-alt); font-size: 13px; }
.tag-add { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 20px; border: 1px dashed var(--text-mute); font-size: 13px; color: var(--text-soft); cursor: pointer; }
.tag-dropdown { position: absolute; z-index: 10; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 4px; box-shadow: 0 10px 30px rgba(0,0,0,.25); min-width: 200px; }
.tag-option { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; font-size: 13px; cursor: pointer; width: 100%; text-align: right; }
.tag-option:hover { background: var(--surface-alt); }
.progress-bar { height: 6px; border-radius: 6px; background: var(--surface-alt); overflow: hidden; flex: 1; }
.progress-fill { height: 100%; border-radius: 6px; background: var(--violet); }
.btn-outline { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--text-soft); }

/* ADD MODAL */
.add-modal { position: fixed; inset: 0; background: var(--overlay); z-index: 50; display: none; place-items: center; padding: 16px; }
.add-modal.open { display: grid; }
.add-card { background: var(--surface); border-radius: 20px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,.3); overflow: hidden; }
.add-head { padding: 16px 24px; border-bottom: 1px solid var(--border-soft); display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 18px; }
.add-body { padding: 24px; }
.add-foot { padding: 16px 24px; border-top: 1px solid var(--border-soft); display: flex; justify-content: flex-end; gap: 8px; }
.btn-cancel { padding: 8px 16px; border-radius: 10px; font-size: 13px; color: var(--text-soft); }
.btn-submit { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; background: var(--violet); color: #fff; }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 24px; z-index: 60; padding: 12px 20px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  box-shadow: 0 12px 40px var(--shadow); font-size: 14px; font-weight: 500;
  transform: translateY(100px); opacity: 0; transition: .3s;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--violet); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* AURORA BACKGROUND */
.aurora-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; transition: opacity .5s; }
[data-theme="light"] .aurora-bg { opacity: 0; }
[data-theme="dark"] .aurora-bg { opacity: 1; }
.aurora-bg .grad { position: absolute; inset: 0; background: linear-gradient(160deg, #2B1B52 0%, #361F63 52%, #4A2A7A 100%); }
.aurora-bg .blob { position: absolute; border-radius: 50%; filter: blur(80px); mix-blend-mode: screen; }
.aurora-bg .b1 { width: 50vw; height: 50vw; top: -14%; left: -8%; opacity: .5; background: radial-gradient(circle, #FF8E72 0%, transparent 60%); animation: adrift1 26s ease-in-out infinite; }
.aurora-bg .b2 { width: 42vw; height: 42vw; bottom: -16%; left: 12%; opacity: .4; background: radial-gradient(circle, #62DDF0 0%, transparent 64%); animation: adrift2 30s ease-in-out infinite; }
.aurora-bg .b3 { width: 44vw; height: 44vw; top: 4%; right: -14%; opacity: .45; background: radial-gradient(circle, #FFC15E 0%, transparent 62%); animation: adrift3 34s ease-in-out infinite; }
.aurora-bg .b4 { width: 32vw; height: 32vw; bottom: -8%; right: 8%; opacity: .35; background: radial-gradient(circle, #FF86BC 0%, transparent 64%); animation: adrift1 30s ease-in-out infinite reverse; }
@keyframes adrift1 { 0%,100% { transform: translate(0,0) } 50% { transform: translate(8vw,6vh) } }
@keyframes adrift2 { 0%,100% { transform: translate(0,0) } 50% { transform: translate(-6vw,-7vh) } }
@keyframes adrift3 { 0%,100% { transform: translate(0,0) } 50% { transform: translate(-7vw,8vh) } }
.aurora-bg .stars {
  position: absolute; inset: 0; opacity: .35; animation: twinkle 7s ease-in-out infinite alternate;
  background-image:
    radial-gradient(1.4px 1.4px at 12% 22%, #fff, transparent),
    radial-gradient(1px 1px at 32% 68%, #e6e0ff, transparent),
    radial-gradient(1.2px 1.2px at 58% 18%, #fff, transparent),
    radial-gradient(1px 1px at 74% 52%, #ddd6ff, transparent),
    radial-gradient(1.3px 1.3px at 88% 78%, #fff, transparent),
    radial-gradient(1px 1px at 46% 88%, #e6e0ff, transparent),
    radial-gradient(1.1px 1.1px at 20% 50%, #fff, transparent),
    radial-gradient(1px 1px at 65% 35%, #ddd6ff, transparent),
    radial-gradient(1.2px 1.2px at 40% 80%, #fff, transparent);
}
@keyframes twinkle { from { opacity: .2 } to { opacity: .5 } }

/* GLASSMORPHISM for dark mode */
[data-theme="dark"] .card,
[data-theme="dark"] .stat-card,
[data-theme="dark"] .kanban-col,
[data-theme="dark"] .add-card,
[data-theme="dark"] .drawer,
[data-theme="dark"] .toast {
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 4px 24px rgba(0,0,0,.2);
}
[data-theme="dark"] .banner {
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  background: rgba(30,15,55,0.82);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 2px 20px rgba(0,0,0,.2);
}
[data-theme="dark"] .kanban-card {
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  background: rgba(25,12,50,0.5);
}
[data-theme="dark"] .nav-tabs { background: rgba(20,10,40,0.5); }
[data-theme="dark"] .filter-bar { background: rgba(20,10,40,0.5); border-color: rgba(255,255,255,0.08); }

<script>
/* ============================================================
   FIREBASE INIT
   ============================================================ */
firebase.initializeApp({
  apiKey: "AIzaSyDHv6PN_rbFvw9yIfx0QDh48cwfEJ4bj4Y",
  authDomain: "task-command-e573f.firebaseapp.com",
  projectId: "task-command-e573f",
  storageBucket: "task-command-e573f.firebasestorage.app",
  messagingSenderId: "635200666095",
  appId: "1:635200666095:web:f36c5bcc946a5d28a49e1a"
});
const auth = firebase.auth();
const db = firebase.firestore();
let currentUser = null;
let ADMIN_UID = null;

/* ============================================================
   DATA
   ============================================================ */
const STATUS_DEFAULTS = {
  todo:       { label: "לביצוע",     color: "#8B5CF6", icon: "○" },
  inprogress: { label: "בתהליך",     color: "#F59E0B", icon: "◔" },
  waiting:    { label: "ממתין לאחר", color: "#3B82F6", icon: "⏸" },
  done:       { label: "הושלם",      color: "#10B981", icon: "✓" },
};
const PRIO_DEFAULTS = {
  high:   { label: "גבוה",  color: "#F43F5E" },
  medium: { label: "בינוני", color: "#F59E0B" },
  low:    { label: "נמוך",  color: "#10B981" },
};
const STATUS_MAP = JSON.parse(JSON.stringify(STATUS_DEFAULTS));
const PRIO_MAP = JSON.parse(JSON.stringify(PRIO_DEFAULTS));
const DEFAULT_CATS = [
  { id: "c1", name: "אסטרטגיה דיגיטלית", color: "#2BB5A3" },
  { id: "c2", name: "פרויקטי אגף",        color: "#42B4E6" },
  { id: "c3", name: "תפעול ושוטף",        color: "#FF8E72" },
  { id: "c4", name: "ישיבות ומעקב",       color: "#FFCB6B" },
];

let tasks = [];
let categories = [];
let people = [];
let activityLog = [];
let templates = [];
let savedFilters = [];
let currentView = "dash";
let drillFilter = null;
let statusFilter = "all";
let prioFilter = "all";
let personFilter = "all";
let catFilter = "all";
let searchQuery = "";
let charts = {};
let calendarEvents = [];
let calViewMode = (()=>{ try { return localStorage.getItem("tc-calview") || "week"; } catch(e) { return "week"; } })();
let calBaseDate = new Date();

/* ============================================================
   AUTH
   ============================================================ */
let googleAccessToken = null;

function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope("https://www.googleapis.com/auth/calendar.readonly");
  auth.signInWithPopup(provider).then(result => {
    if (result.credential) {
      googleAccessToken = result.credential.accessToken;
      try { sessionStorage.setItem("tc-gtoken", googleAccessToken); } catch(e) {}
      fetchCalendarEvents();
    }
  }).catch(err => {
    document.getElementById("loginError").textContent = "שגיאה: " + err.message;
    document.getElementById("loginError").classList.remove("hidden");
  });
}

function reconnectCalendar() {
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope("https://www.googleapis.com/auth/calendar.readonly");
  auth.currentUser.reauthenticateWithPopup(provider).then(result => {
    if (result.credential) {
      googleAccessToken = result.credential.accessToken;
      try { sessionStorage.setItem("tc-gtoken", googleAccessToken); } catch(e) {}
      fetchCalendarEvents();
      showToast("📅 יומן Google חובר בהצלחה!");
    }
  }).catch(err => { showToast("שגיאה בחיבור יומן: " + err.message); });
}

auth.onAuthStateChanged(async user => {
  if (user) {
    currentUser = user;
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    const avatar = document.getElementById("userAvatar");
    if (user.photoURL) {
      avatar.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;border-radius:50%">`;
    } else {
      avatar.textContent = user.displayName?.charAt(0) || "?";
    }
    avatar.title = user.displayName || user.email;
    document.getElementById("userMenuName").textContent = user.displayName || user.email;

    // Restore calendar token
    try { googleAccessToken = googleAccessToken || sessionStorage.getItem("tc-gtoken"); } catch(e) {}

    await initData();
    renderNav();
    renderView();
    if (googleAccessToken) fetchCalendarEvents();
  } else {
    currentUser = null;
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("app").classList.add("hidden");
  }
});

/* ============================================================
   FIRESTORE DATA
   ============================================================ */
function userDoc(collection) {
  return db.collection("users").doc(currentUser.uid).collection(collection);
}

async function initData() {
  // Load categories
  const catSnap = await userDoc("categories").get();
  if (catSnap.empty) {
    // First time: seed defaults
    for (const c of DEFAULT_CATS) {
      await userDoc("categories").doc(c.id).set({ name: c.name, color: c.color, order: DEFAULT_CATS.indexOf(c) });
    }
    categories = [...DEFAULT_CATS];
  } else {
    categories = catSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  // Load people
  const pplSnap = await userDoc("people").get();
  if (pplSnap.empty) {
    const me = { name: currentUser.displayName || "אני", email: currentUser.email, initials: (currentUser.displayName || "א").charAt(0), color: "#2BB5A3", isMe: true };
    await userDoc("people").doc("me").set(me);
    people = [{ id: "me", ...me }];
  } else {
    people = pplSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  // Populate add modal category select
  const sel = document.getElementById("addCat");
  sel.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join("");

  // Set default date
  document.getElementById("addDue").value = todayISO();

  // Listen to tasks in real-time
  userDoc("tasks").orderBy("createdAt", "desc").onSnapshot(snap => {
    tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderView();
  });

  // Load activity
  userDoc("activity").orderBy("time", "desc").limit(20).onSnapshot(snap => {
    activityLog = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentView === "dash") renderView();
  });

  // Load status/priority customizations (labels + colors)
  const cfgSnap = await userDoc("config").doc("labels").get();
  if (cfgSnap.exists) {
    const cfg = cfgSnap.data();
    if (cfg.status) Object.keys(cfg.status).forEach(k => { if (STATUS_MAP[k]) Object.assign(STATUS_MAP[k], cfg.status[k]); });
    if (cfg.prio) Object.keys(cfg.prio).forEach(k => { if (PRIO_MAP[k]) Object.assign(PRIO_MAP[k], cfg.prio[k]); });
  }

  // Load templates
  userDoc("templates").onSnapshot(snap => {
    templates = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateTemplateSelect();
    if (currentView === "admin") renderView();
  });

  // Load saved filters
  userDoc("filters").onSnapshot(snap => {
    savedFilters = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (currentView === "board") renderView();
  });

  // Process recurring tasks - create next occurrence when one is completed
  checkRecurring();
}

function updateTemplateSelect() {
  const sel = document.getElementById("addTemplate");
  if (sel) sel.innerHTML = '<option value="">— ללא תבנית —</option>' + templates.map(t => `<option value="${t.id}">${t.name}</option>`).join("");
}

/* ============================================================
   GOOGLE CALENDAR INTEGRATION
   ============================================================ */
let calTokenExpired = false;
async function fetchCalendarEvents() {
  if (!googleAccessToken) return;
  try {
    const listRes = await fetch("https://www.googleapis.com/calendar/v3/users/me/calendarList", {
      headers: { Authorization: "Bearer " + googleAccessToken }
    });
    if (listRes.status === 401 || listRes.status === 403) {
      // Token expired
      calTokenExpired = true;
      googleAccessToken = null;
      try { sessionStorage.removeItem("tc-gtoken"); } catch(e) {}
      if (currentView === "cal" || currentView === "today") renderView();
      return;
    }
    if (!listRes.ok) { console.warn("Calendar API:", listRes.status); return; }
    calTokenExpired = false;
    const listData = await listRes.json();
    
    // Find work calendar - flexible matching
    const workCal = listData.items?.find(c => c.summary?.trim() === "עבודה")
      || listData.items?.find(c => c.summary?.includes("עבודה"))
      || listData.items?.find(c => c.summary?.toLowerCase().includes("work"))
      || listData.items?.find(c => c.primary);
    if (!workCal) return;
    
    // Fetch 2 months range for navigation
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString();
    const end = new Date(now.getFullYear(), now.getMonth() + 2, 0, 23, 59).toISOString();
    
    const evRes = await fetch(
      `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(workCal.id)}/events?timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime&maxResults=200`,
      { headers: { Authorization: "Bearer " + googleAccessToken } }
    );
    if (!evRes.ok) return;
    const evData = await evRes.json();
    
    calendarEvents = (evData.items || []).map(ev => ({
      id: ev.id,
      title: ev.summary || "(ללא כותרת)",
      start: ev.start?.dateTime || ev.start?.date || "",
      end: ev.end?.dateTime || ev.end?.date || "",
      allDay: !!ev.start?.date,
      calName: workCal.summary,
    }));
    
    if (currentView === "cal" || currentView === "today") renderView();
  } catch (e) { console.warn("Calendar fetch error:", e); }
}

// Auto-refresh calendar every 2 minutes
setInterval(() => { if (googleAccessToken) fetchCalendarEvents(); }, 120000);
// Update "now" line every minute when on calendar
setInterval(() => { if (currentView === "cal" && calViewMode !== "month") renderView(); }, 60000);

/* ============================================================
   HELPERS
   ============================================================ */
function todayISO() { return new Date().toISOString().slice(0, 10); }
function fmtDate(iso) { if (!iso) return ""; const p = iso.split("-"); return `${p[2]}/${p[1]}/${p[0]}`; }
function fmtDateShort(iso) { if (!iso) return ""; const p = iso.split("-"); return `${p[2]}/${p[1]}/${p[0]}`; }
function getCat(id) { return categories.find(c => c.id === id) || { name: "?", color: "#999" }; }
function getPerson(id) { return people.find(p => p.id === id) || { name: "?", initials: "?", color: "#999" }; }
function softColor(hex, dark) { return hex + (dark ? "30" : "1F"); }
function isDark() { return document.body.dataset.theme === "dark"; }

function toggleTheme() {
  const d = document.body.dataset.theme === "dark";
  const newTheme = d ? "light" : "dark";
  document.body.dataset.theme = newTheme;
  document.getElementById("themeBtn").textContent = d ? "🌙" : "☀️";
  try { localStorage.setItem("tc-theme", newTheme); } catch(e) {}
  if (charts.donut) { charts.donut.destroy(); charts.bar.destroy(); }
  if (currentView === "dash") renderView();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

async function logActivity(action, target) {
  await userDoc("activity").add({ who: currentUser.displayName || "אני", action, target, time: firebase.firestore.FieldValue.serverTimestamp() });
}

function formatTime(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Date.now() - d.getTime();
  if (diff < 60000) return "עכשיו";
  if (diff < 3600000) return `לפני ${Math.floor(diff/60000)} דק׳`;
  if (diff < 86400000) return `לפני ${Math.floor(diff/3600000)} שעות`;
  return d.toLocaleDateString("he-IL");
}

function handleSearch(q) { searchQuery = q.trim().toLowerCase(); renderView(); }

function avatarHTML(person, small) {
  const cls = small ? "avatar avatar-sm" : "avatar";
  return `<div class="${cls}" style="background:${person.color}" title="${person.name}">${person.initials || person.name?.charAt(0) || "?"}</div>`;
}

function pillHTML(label, color) {
  return `<span class="pill" style="color:${color};background:${softColor(color, isDark())}">⚑ ${label}</span>`;
}

/* ============================================================
   NAVIGATION
   ============================================================ */
const VIEWS = [
  { id: "dash",  label: "דשבורד",   icon: "📊" },
  { id: "today", label: "היום שלי", icon: "☀️" },
  { id: "board", label: "לוח משימות", icon: "▦" },
  { id: "cal",   label: "לוח שנה",  icon: "📅" },
  { id: "admin", label: "ניהול",    icon: "⚙️" },
];

function renderNav() {
  document.getElementById("navTabs").innerHTML = VIEWS.map(v =>
    `<button class="nav-tab ${v.id === currentView ? 'active' : ''}" onclick="switchView('${v.id}')">${v.icon} ${v.label}</button>`
  ).join("");
}

function switchView(v) {
  currentView = v; drillFilter = null; statusFilter = "all"; searchQuery = "";
  document.getElementById("searchInput").value = "";
  renderNav(); renderView();
}

/* ============================================================
   RENDER ROUTER
   ============================================================ */
function renderView() {
  const el = document.getElementById("content");
  switch (currentView) {
    case "dash":  renderDashboard(el); break;
    case "today": renderToday(el); break;
    case "board": renderBoard(el); break;
    case "cal":   renderCalendar(el); break;
    case "admin": renderAdmin(el); break;
  }
  // Update bell badge
  const overdue = tasks.filter(t => t.status !== "done" && t.due < todayISO()).length;
  document.getElementById("bellBadge").textContent = overdue;
  document.getElementById("bellBadge").style.display = overdue ? "grid" : "none";
}

function filteredTasks() {
  let list = tasks;
  if (searchQuery) list = list.filter(t => t.title.toLowerCase().includes(searchQuery) || getCat(t.cat).name.toLowerCase().includes(searchQuery));
  if (statusFilter !== "all") list = list.filter(t => t.status === statusFilter);
  if (prioFilter !== "all") list = list.filter(t => t.prio === prioFilter);
  if (catFilter !== "all") list = list.filter(t => t.cat === catFilter);
  if (personFilter !== "all") list = list.filter(t => (t.tags || []).includes(personFilter));
  return list;
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function renderDashboard(el) {
  const ft = filteredTasks();
  const counts = { todo: 0, inprogress: 0, waiting: 0, done: 0 };
  ft.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
  const overdue = ft.filter(t => t.status !== "done" && t.due < todayISO()).length;
  const hot = ft.filter(t => t.status !== "done" && (t.due <= todayISO() || t.prio === "high")).sort((a, b) => (a.due || "").localeCompare(b.due || ""));

  const h = new Date().getHours();
  const greet = h < 12 ? "בוקר טוב" : h < 18 ? "צהריים טובים" : "ערב טוב";

  let drillHTML = "";
  if (drillFilter) {
    let drilled = [];
    let drillLabel = "";
    if (drillFilter.type === "status") { drilled = ft.filter(t => t.status === drillFilter.value); drillLabel = STATUS_MAP[drillFilter.value]?.label; }
    else if (drillFilter.type === "cat") { drilled = ft.filter(t => t.cat === drillFilter.value && t.status !== "done"); drillLabel = getCat(drillFilter.value).name; }
    else if (drillFilter.type === "overdue") { drilled = ft.filter(t => t.status !== "done" && t.due < todayISO()); drillLabel = "באיחור"; }
    drillHTML = `
      <div class="card drill-panel">
        <div class="drill-head">
          <span>דריל-דאון · ${drilled.length} משימות · "${drillLabel}"</span>
          <button onclick="drillFilter=null;renderView()" style="color:var(--text-mute);font-size:18px">✕</button>
        </div>
        ${drilled.map(t => taskRowHTML(t)).join("") || '<div class="empty">אין משימות תואמות.</div>'}
      </div>`;
  }

  el.innerHTML = `
    <div style="color:var(--text-mute);font-size:14px">${greet} 👋</div>
    <h1 class="page-title">תמונת מצב</h1>
    <p class="page-sub">יש לך <b style="color:var(--red)">${hot.length} משימות בוערות</b> ו־<b style="color:var(--blue)">${counts.waiting} ממתינות לאחרים</b>. לחיצה על גרף מציגה את המשימות עצמן.</p>

    <div class="stats-grid">
      ${Object.keys(STATUS_MAP).map(k => {
        const c = STATUS_MAP[k].color;
        const on = drillFilter?.type==='status'&&drillFilter?.value===k;
        return `
        <div class="stat-card ${on?'active':''}" style="background:${softColor(c,isDark())};border:1px solid ${on?c:softColor(c,isDark())};border-right:5px solid ${c};${on?`box-shadow:0 0 0 2px ${c}55`:''}" onclick="toggleDrill('status','${k}')">
          <div class="stat-top">
            <span style="color:${c};font-size:20px">${STATUS_MAP[k].icon}</span>
            <span class="stat-num" style="color:${c}">${counts[k]}</span>
          </div>
          <div class="stat-label" style="color:${c};font-weight:600">${STATUS_MAP[k].label}</div>
        </div>`;
      }).join("")}
      <div class="stat-card ${drillFilter?.type==='overdue'?'active':''}" style="background:${softColor('#F43F5E',isDark())};border:1px solid ${drillFilter?.type==='overdue'?'#F43F5E':softColor('#F43F5E',isDark())};border-right:5px solid #F43F5E;${drillFilter?.type==='overdue'?'box-shadow:0 0 0 2px #F43F5E55':''}" onclick="toggleDrill('overdue')">
        <div class="stat-top">
          <span style="color:#F43F5E;font-size:20px">⚑</span>
          <span class="stat-num" style="color:#F43F5E">${overdue}</span>
        </div>
        <div class="stat-label" style="color:#F43F5E;font-weight:600">באיחור</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="card chart-card">
        <div class="chart-title">פילוח לפי סטטוס</div>
        <div class="chart-sub">לחיצה על פלח → דריל-דאון</div>
        <canvas id="donutChart"></canvas>
      </div>
      <div class="card chart-card">
        <div class="chart-title">עומס פעיל לפי קטגוריה</div>
        <div class="chart-sub">לחיצה על עמודה → דריל-דאון</div>
        <canvas id="barChart"></canvas>
      </div>
    </div>

    ${drillHTML}

    <div class="bottom-grid">
      <div class="card">
        <div class="card-head">🔥 בוערות עכשיו</div>
        ${hot.map(t => taskRowHTML(t)).join("") || '<div class="empty">אין משימות בוערות!</div>'}
      </div>
      <div class="card">
        <div class="card-head"><span style="color:var(--violet)">●</span> פעילות אחרונה</div>
        <div style="padding:16px">
          ${activityLog.slice(0, 3).map(a => `
            <div class="activity-item">
              <div class="activity-dot"></div>
              <div><b>${a.who}</b> ${a.action} · ${a.target}<div class="activity-time">${formatTime(a.time)}</div></div>
            </div>
          `).join("") || '<div class="empty">אין פעילות עדיין.</div>'}
          <div id="activityMore" class="hidden">
            ${activityLog.slice(3, 20).map(a => `
              <div class="activity-item">
                <div class="activity-dot"></div>
                <div><b>${a.who}</b> ${a.action} · ${a.target}<div class="activity-time">${formatTime(a.time)}</div></div>
              </div>
            `).join("")}
          </div>
          ${activityLog.length > 3 ? `<button onclick="const m=document.getElementById('activityMore');const on=m.classList.toggle('hidden');this.textContent=on?'הצג עוד (${activityLog.length-3})':'הצג פחות'" style="font-size:12px;color:var(--violet);padding:6px 0;font-weight:600;width:100%;text-align:center">הצג עוד (${activityLog.length-3})</button>` : ''}
        </div>
      </div>
    </div>
  `;
  renderCharts(counts);
}

function toggleDrill(type, value) {
  if (drillFilter?.type === type && drillFilter?.value === value) drillFilter = null;
  else drillFilter = { type, value };
  renderView();
}

function renderCharts(counts) {
  const donutCtx = document.getElementById("donutChart")?.getContext("2d");
  const barCtx = document.getElementById("barChart")?.getContext("2d");
  if (!donutCtx || !barCtx) return;

  const textColor = isDark() ? "#D4C8ED" : "#3D5654";
  const dpr = Math.max(2, window.devicePixelRatio || 1);

  charts.donut = new Chart(donutCtx, {
    type: "doughnut",
    data: {
      labels: Object.values(STATUS_MAP).map(s => s.label),
      datasets: [{ data: [counts.todo, counts.inprogress, counts.waiting, counts.done],
        backgroundColor: Object.values(STATUS_MAP).map(s => s.color),
        borderWidth: 0, borderRadius: 8, spacing: 4, hoverOffset: 8 }]
    },
    options: {
      cutout: "68%", responsive: true, maintainAspectRatio: false, devicePixelRatio: dpr,
      plugins: { legend: { position: "left", rtl: true, labels: { color: textColor, font: { family: "Rubik", size: 13 }, padding: 14, usePointStyle: true, pointStyle: "circle", boxWidth: 8 } } },
      onClick: (e, els) => { if (els.length) { const k = Object.keys(STATUS_MAP)[els[0].index]; toggleDrill("status", k); } }
    }
  });

  const catData = categories.map(c => ({ name: c.name, color: c.color, id: c.id, count: tasks.filter(t => t.cat === c.id && t.status !== "done").length }));
  charts.bar = new Chart(barCtx, {
    type: "bar",
    data: {
      labels: catData.map(c => c.name),
      datasets: [{ data: catData.map(c => c.count), backgroundColor: catData.map(c => c.color), borderRadius: 8, barThickness: 22 }]
    },
    options: {
      indexAxis: "y", responsive: true, maintainAspectRatio: false, devicePixelRatio: dpr,
      plugins: { legend: { display: false } },
      scales: { x: { display: false }, y: { ticks: { color: textColor, font: { family: "Rubik", size: 12 } }, grid: { display: false }, border: { display: false } } },
      onClick: (e, els) => { if (els.length) { toggleDrill("cat", catData[els[0].index].id); } }
    }
  });
}

/* ============================================================
   TASK ROW HTML (shared)
   ============================================================ */
function taskRowHTML(t) {
  const S = STATUS_MAP[t.status] || STATUS_MAP.todo;
  const P = PRIO_MAP[t.prio] || PRIO_MAP.medium;
  const cat = getCat(t.cat);
  const od = t.status !== "done" && t.due < todayISO();
  const avatars = (t.tags || []).map(pid => avatarHTML(getPerson(pid), true)).join("");
  return `
    <div class="task-row" onclick="openDrawer('${t.id}')">
      <div class="task-dot" style="background:${S.color}"></div>
      <div class="task-info">
        <div class="task-title ${t.status==='done'?'done':''}">${t.title}</div>
        <div class="task-cat">📁 ${cat.name}</div>
      </div>
      ${pillHTML(P.label, P.color)}
      <div class="task-due" style="color:${od?'var(--red)':'var(--text-soft)'}">🕐 ${fmtDateShort(t.due)}</div>
      <div class="task-avatars">${avatars}</div>
    </div>`;
}

/* ============================================================
   TODAY VIEW
   ============================================================ */
function renderToday(el) {
  const todayStr = todayISO();
  const overdue = tasks.filter(t => t.status !== "done" && t.due < todayStr)
    .sort((a, b) => (a.due || "").localeCompare(b.due || ""));
  const todayTasks = tasks.filter(t => t.status !== "done" && t.due === todayStr)
    .sort((a, b) => ({ high: 0, medium: 1, low: 2 }[a.prio] - { high: 0, medium: 1, low: 2 }[b.prio]));
  const todayEvents = calendarEvents.filter(ev => ev.start.startsWith(todayStr))
    .sort((a, b) => a.start.localeCompare(b.start));

  const dayName = new Date().toLocaleDateString("he-IL", { weekday: "long", day: "numeric", month: "long", year: "numeric" });

  el.innerHTML = `
    <h1 class="page-title">היום שלי</h1>
    <p class="page-sub">${dayName} · ${todayTasks.length} משימות להיום${overdue.length ? ` · <b style="color:var(--red)">${overdue.length} באיחור</b>` : ''}</p>

    ${todayEvents.length ? `
    <!-- TODAY'S SCHEDULE -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-head">📅 לוז היום מהיומן (${todayEvents.length} מופעים)</div>
      <div style="padding:16px;display:grid;gap:8px">
        ${todayEvents.map(ev => {
          const time = ev.allDay ? "כל היום" : new Date(ev.start).toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" });
          const endTime = ev.allDay ? "" : new Date(ev.end).toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" });
          return `<div style="display:flex;align-items:center;gap:16px;padding:12px 16px;border-radius:10px;background:linear-gradient(120deg,rgba(255,142,114,0.1),rgba(255,203,107,0.06));border-right:4px solid var(--coral)">
            <div style="min-width:120px;font-size:15px;font-weight:700;color:var(--coral);white-space:nowrap">${time}${endTime ? ` — ${endTime}` : ''}</div>
            <div style="font-size:14px;font-weight:500">${ev.title}</div>
          </div>`;
        }).join("")}
      </div>
    </div>` : ''}

    <div style="display:grid;grid-template-columns:${overdue.length ? '1fr 1fr' : '1fr'};gap:16px">
      <!-- TODAY'S TASKS -->
      ${todayTasks.length ? `
      <div class="card">
        <div class="card-head">✅ משימות להיום (${todayTasks.length})</div>
        ${todayTasks.map(t => taskRowHTML(t)).join("")}
      </div>` : '<div class="card"><div class="empty">אין משימות להיום 🎉</div></div>'}

      ${overdue.length ? `
      <div class="card" style="border-color:var(--red)">
        <div class="card-head" style="color:var(--red)">⚠️ באיחור (${overdue.length})</div>
        ${overdue.map(t => taskRowHTML(t)).join("")}
      </div>` : ''}
    </div>
  `;
}

/* ============================================================
   TASKS VIEW
   ============================================================ */
function renderTasks(el) {
  const ft = filteredTasks();
  const filterBtns = [["all", "הכול"], ...Object.entries(STATUS_MAP).map(([k, v]) => [k, v.label])];
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
      <h1 class="page-title" style="margin:0">כל המשימות</h1>
      <div class="filter-bar">${filterBtns.map(([k, l]) =>
        `<button class="filter-btn ${statusFilter===k?'active':''}" onclick="statusFilter='${k}';renderView()">${l}</button>`
      ).join("")}</div>
    </div>
    ${categories.map(c => {
      const items = ft.filter(t => t.cat === c.id && (statusFilter === "all" || t.status === statusFilter));
      if (!items.length) return "";
      return `
        <div class="card cat-section">
          <div class="cat-head" onclick="this.nextElementSibling.classList.toggle('hidden')">
            <span style="font-size:14px;color:var(--text-mute)">▼</span>
            <div class="cat-dot" style="background:${c.color}"></div>
            <span>${c.name}</span>
            <span class="cat-count">${items.length} משימות</span>
          </div>
          <div>
            ${items.map(t => {
              const subsHTML = (t.subtasks || []).map(s =>
                `<div class="subtask" onclick="event.stopPropagation();toggleSub('${t.id}','${s.id}')">
                  <div class="subtask-box ${s.done?'checked':''}">${s.done?"✓":""}</div>
                  <span style="${s.done?'text-decoration:line-through;color:var(--text-mute)':''}">${s.text}</span>
                </div>`
              ).join("");
              return taskRowHTML(t) + (subsHTML ? `<div class="subtask-list">${subsHTML}</div>` : "");
            }).join("")}
          </div>
        </div>`;
    }).join("")}
    ${ft.length === 0 ? '<div class="card"><div class="empty">אין משימות עדיין. לחץ "משימה" למעלה כדי להתחיל!</div></div>' : ""}
  `;
}

async function dropTask(e, newStatus) {
  e.preventDefault();
  const id = e.dataTransfer.getData("text");
  if (!id) return;
  const t = tasks.find(x => x.id === id);
  await userDoc("tasks").doc(id).update({ status: newStatus, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  await logActivity("עדכן סטטוס ל" + STATUS_MAP[newStatus].label, t?.title || "");
  if (newStatus === "done" && t && t.recur && t.recur !== "none") {
    await spawnRecurrence(t);
    showToast(`✓ הושלם · נוצרה החזרה הבאה (${{daily:'מחר',weekly:'שבוע הבא',biweekly:'בעוד שבועיים',monthly:'חודש הבא'}[t.recur]})`);
  } else {
    showToast(`עודכן ל"${STATUS_MAP[newStatus].label}"`);
  }
}

      ${modes.map(m => `<button class="filter-btn ${calViewMode===m.id?'active':''}" onclick="calViewMode='${m.id}';try{localStorage.setItem('tc-calview','${m.id}')}catch(e){};renderView()" style="padding:5px 12px;border-radius:8px;${calViewMode===m.id?'background:var(--violet);color:#fff':'border:1px solid var(--border)'}">${m.label}</button>`).join("")}
    </div>
    <p class="page-sub" style="margin-bottom:12px">
      ${calTokenExpired
        ? '⚠️ החיבור ליומן פג תוקף · <button onclick="reconnectCalendar()" style="color:var(--coral);font-weight:600;text-decoration:underline;background:none;border:none;cursor:pointer;font-size:inherit;font-family:inherit">לחץ כאן לחיבור מחדש</button>'
        : calConnected
        ? '📅 פגישות מיומן "<b>עבודה</b>" · מתעדכן אוטומטית כל 2 דק׳'
        : '⚠️ יומן Google לא מחובר · <button onclick="reconnectCalendar()" style="color:var(--coral);font-weight:600;text-decoration:underline;background:none;border:none;cursor:pointer;font-size:inherit;font-family:inherit">לחץ כאן לחיבור היומן</button>'}
    </p>
    ${calViewMode === "month" ? renderCalMonth() : renderCalColumns()}
  `;
}

function calNav(dir) {
  const d = calBaseDate;
  if (calViewMode === "month") d.setMonth(d.getMonth() + dir);
  else if (calViewMode === "day") d.setDate(d.getDate() + dir);
  else if (calViewMode === "3day") d.setDate(d.getDate() + dir * 3);
  else if (calViewMode === "workweek" || calViewMode === "week") d.setDate(d.getDate() + dir * 7);
  renderView();
}

function getCalDays() {
  const d = new Date(calBaseDate);
  if (calViewMode === "day") return [new Date(d)];
  if (calViewMode === "3day") return [0,1,2].map(i => { const x = new Date(d); x.setDate(x.getDate()+i); return x; });
  if (calViewMode === "workweek") {
    const dayOfWeek = d.getDay();
    const sun = new Date(d); sun.setDate(sun.getDate() - dayOfWeek);
    return [0,1,2,3,4].map(i => { const x = new Date(sun); x.setDate(x.getDate()+i); return x; });
  }
  if (calViewMode === "week") {
    const dayOfWeek = d.getDay();
    const sun = new Date(d); sun.setDate(sun.getDate() - dayOfWeek);
    return [0,1,2,3,4,5,6].map(i => { const x = new Date(sun); x.setDate(x.getDate()+i); return x; });
  }
  return [];
}

function getCalEndDate() {
  const days = getCalDays();
  return days.length ? days[days.length - 1] : calBaseDate;
}

function isoFromDate(d) { return d.toISOString().slice(0, 10); }
const DAY_NAMES = ["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"];

function renderCalColumns() {
  const days = getCalDays();
  const todayStr = todayISO();
  const START_H = 7, END_H = 20, ROW_H = 44;
  const totalH = (END_H - START_H) * ROW_H;

  // Hour lines
  let hourLines = "";
  for (let h = START_H; h < END_H; h++) {
    const top = (h - START_H) * ROW_H;
    hourLines += `<div style="position:absolute;top:${top}px;right:0;left:0;height:${ROW_H}px;border-top:1px solid var(--border-soft)"></div>`;
  }

  // Time column
  let timeCol = "";
  for (let h = START_H; h < END_H; h++) {
    timeCol += `<div style="height:${ROW_H}px;display:flex;align-items:flex-start;justify-content:center;padding-top:2px;font-size:11px;font-weight:600;color:var(--text-mute)">${String(h).padStart(2,"0")}:00</div>`;
  }

  // Day columns
  const dayColsHTML = days.map(d => {
    const ds = isoFromDate(d);
    const isToday = ds === todayStr;

    // Get events for this day
    const dayEvs = calendarEvents.filter(ev => ev.start.startsWith(ds) && !ev.allDay).map(ev => {
      const s = new Date(ev.start), e = new Date(ev.end);
      const startMin = s.getHours() * 60 + s.getMinutes();
      const endMin = e.getHours() * 60 + e.getMinutes();
      return { ...ev, startMin, endMin, sH: s, eH: e };
    }).sort((a, b) => a.startMin - b.startMin);

    const allDayEvs = calendarEvents.filter(ev => ev.start.startsWith(ds) && ev.allDay);

    // Detect overlaps and assign columns
    const cols = [];
    dayEvs.forEach(ev => {
      let placed = false;
      for (let c = 0; c < cols.length; c++) {
        if (cols[c].every(e => ev.startMin >= e.endMin || ev.endMin <= e.startMin)) {
          cols[c].push(ev); ev._col = c; placed = true; break;
        }
      }
      if (!placed) { ev._col = cols.length; cols.push([ev]); }
    });
    const totalCols = Math.max(1, cols.length);

    // Render events
    let evsHTML = "";
    dayEvs.forEach(ev => {
      const top = ((ev.startMin / 60) - START_H) * ROW_H;
      const height = Math.max(ROW_H * 0.7, ((ev.endMin - ev.startMin) / 60) * ROW_H);
      const width = 100 / totalCols;
      const right = ev._col * width;
      const time = ev.sH.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
      const endT = ev.eH.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
      const compact = height < 50;
      evsHTML += `<div style="position:absolute;top:${top}px;right:${right}%;width:${width}%;height:${height}px;padding:1px 2px;z-index:2;box-sizing:border-box" title="${ev.title} (${time}—${endT})">
        <div style="background:linear-gradient(160deg,rgba(255,142,114,0.3),rgba(255,203,107,0.18));border-right:3px solid var(--coral);border-radius:6px;height:100%;padding:3px 6px;font-size:10px;overflow:hidden;box-sizing:border-box">
          <div style="color:var(--coral);font-weight:700;font-size:10px">${time}—${endT}</div>
          ${!compact ? `<div style="margin-top:2px;font-size:11px;line-height:1.2">${ev.title}</div>` : `<div style="font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ev.title}</div>`}
        </div>
      </div>`;
    });

    // All day events at top
    let allDayHTML = allDayEvs.map(ev =>
      `<div style="background:linear-gradient(120deg,rgba(255,142,114,0.2),rgba(255,203,107,0.12));border-right:3px solid var(--coral);border-radius:4px;padding:3px 6px;margin:2px;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"><b style="color:var(--coral)">כל היום</b> ${ev.title}</div>`
    ).join("");

    return `<div style="flex:1;border-left:1px solid var(--border-soft);${isToday?'background:rgba(255,142,114,0.06)':''}">
      <div style="text-align:center;padding:8px;font-weight:600;border-bottom:2px solid ${isToday?'#FF8E72':'var(--border)'}">
        <div style="font-size:11px;color:${isToday?'#FF8E72':'var(--text-mute)'}">${DAY_NAMES[d.getDay()]}</div>
        <div class="cal-day ${isToday?'today':''}" style="margin:4px auto">${d.getDate()}</div>
      </div>
      ${allDayHTML ? `<div style="border-bottom:1px solid var(--border-soft)">${allDayHTML}</div>` : ""}
      <div style="position:relative;height:${totalH}px">
        ${hourLines}
        ${evsHTML}
      </div>
    </div>`;
  }).join("");

  // Full-width now line (spans entire grid)
  let fullNowLine = "";
  const showingToday = days.some(d => isoFromDate(d) === todayStr);
  if (showingToday) {
    const now = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    if (nowMin >= START_H * 60 && nowMin <= END_H * 60) {
      const top = ((nowMin / 60) - START_H) * ROW_H;
      const timeLabel = now.toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" });
      fullNowLine = `<div style="position:absolute;top:${top}px;right:0;left:0;z-index:6;pointer-events:none">
        <div style="position:absolute;right:0;top:-9px;background:#F43F5E;color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px">${timeLabel}</div>
        <div style="height:2px;background:#F43F5E;box-shadow:0 0 8px rgba(244,63,94,.7)"></div>
      </div>`;
    }
  }

  return `<div class="card" style="overflow:hidden">
    <div style="display:flex;position:relative">
      <div style="width:54px;flex-shrink:0;padding-top:58px;border-left:1px solid var(--border-soft);position:relative;z-index:2">${timeCol}</div>
      ${dayColsHTML}
      <div style="position:absolute;top:58px;right:54px;left:0;height:${totalH}px;pointer-events:none">${fullNowLine}</div>
    </div>
  </div>`;
}

function renderCalMonth() {
  const y = calBaseDate.getFullYear(), m = calBaseDate.getMonth();
  const first = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const todayStr = todayISO();

  let cells = "";
  for (let i = 0; i < first; i++) cells += '<div class="cal-cell"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const ds = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dayEvents = calendarEvents.filter(ev => ev.start.startsWith(ds))
      .sort((a,b) => a.start.localeCompare(b.start));
    const isToday = ds === todayStr;
    const evHTML = dayEvents.slice(0, 4).map(ev => {
      const time = ev.allDay ? "" : new Date(ev.start).toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"}) + " ";
      return `<div class="cal-task cal-event" title="${ev.title}">${time}${ev.title}</div>`;
    }).join("");
    const more = dayEvents.length > 4 ? `<div style="font-size:10px;color:var(--text-mute);padding:0 4px">+${dayEvents.length-4} נוספים</div>` : "";
    cells += `<div class="cal-cell"><div class="cal-day ${isToday?'today':''}">${d}</div>${evHTML}${more}</div>`;
  }
  return `<div class="card" style="overflow:hidden"><div class="cal-grid">
    ${["א","ב","ג","ד","ה","ו","ש"].map(d=>`<div class="cal-head">${d}</div>`).join("")}
    ${cells}
  </div></div>`;
}

async function addTask() {
  const title = document.getElementById("addTitle").value.trim();
  if (!title) return;
  const recur = document.getElementById("addRecur").value;
  const task = {
    title,
    cat: document.getElementById("addCat").value,

  } else {
    showToast("✓ משימה נוספה");
  }
  window._tplSubtasks = [];
  closeAddModal();
}

/* Recurring: when a recurring task is marked done, spawn the next occurrence */
function nextRecurDate(dateStr, recur) {
  const d = new Date(dateStr);
  if (recur === "daily") d.setDate(d.getDate() + 1);
  else if (recur === "weekly") d.setDate(d.getDate() + 7);
  else if (recur === "biweekly") d.setDate(d.getDate() + 14);
  else if (recur === "monthly") d.setMonth(d.getMonth() + 1);
  return isoFromDate(d);
}

async function spawnRecurrence(task) {
  if (!task.recur || task.recur === "none") return;
  const nextDue = nextRecurDate(task.due, task.recur);
  // Avoid duplicate: check if a task with same title+due already exists
  if (tasks.some(t => t.title === task.title && t.due === nextDue && t.recur === task.recur)) return;
  await userDoc("tasks").add({
    title: task.title, cat: task.cat, status: "todo", prio: task.prio,
    due: nextDue, est: task.est || 2, spent: 0, tags: task.tags || [],
    project: task.project || "", notes: task.notes || "",
    subtasks: (task.subtasks || []).map(s => ({ id: "s"+Date.now()+Math.random(), text: s.text, done: false })),
    recur: task.recur,
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  });
}

function closeDrawer() { document.getElementById("drawerOverlay").classList.remove("open"); }

async function updateField(id, field, value) {
  const t = tasks.find(x => x.id === id);
  await userDoc("tasks").doc(id).update({ [field]: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
  if (field === "status") {
    await logActivity("עדכן סטטוס ל" + STATUS_MAP[value]?.label, t?.title || "");
    if (value === "done" && t && t.recur && t.recur !== "none") {
      await spawnRecurrence(t);
      showToast("✓ הושלם · נוצרה החזרה הבאה");
    }
  }
}

async function deleteTask(id) {
  if (!confirm("למחוק את המשימה?")) return;
  const t = tasks.find(x => x.id === id);
  await userDoc("tasks").doc(id).delete();
  await logActivity("מחק", t?.title || "");
  closeDrawer();
  showToast("🗑 משימה נמחקה");
}

async function toggleSub(taskId, subId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  const subs = (t.subtasks || []).map(s => s.id === subId ? { ...s, done: !s.done } : s);
  await userDoc("tasks").doc(taskId).update({ subtasks: subs });
}

async function addSub(taskId) {
  const inp = document.getElementById("newSubInput");
  const text = inp.value.trim();
  if (!text) return;
  const t = tasks.find(x => x.id === taskId);
  const subs = [...(t.subtasks || []), { id: "s" + Date.now(), text, done: false }];
  await userDoc("tasks").doc(taskId).update({ subtasks: subs });
  inp.value = "";
  setTimeout(() => openDrawer(taskId), 300);
}

async function tagPerson(taskId, personId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t || (t.tags || []).includes(personId)) return;
  const tags = [...(t.tags || []), personId];
  await userDoc("tasks").doc(taskId).update({ tags });
  const person = getPerson(personId);
  if (!person.isMe) {
    showToast(`📧 התראה נשלחה ל${person.name} — תויג/ה במשימה`);
    await logActivity(`תייג את ${person.name}`, t.title);
  }
  setTimeout(() => openDrawer(taskId), 300);
}

        <div class="admin-add-row" style="flex-wrap:wrap;align-items:center">
          <input class="input" id="newCatName" placeholder="שם קטגוריה חדשה…" style="flex:2;min-width:140px">
          <input type="color" id="newCatColor" value="#2BB5A3" style="width:42px;height:36px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:none" title="בחר צבע חופשי">

      <div class="card admin-section">
        <div class="admin-section-head">

        </div>
        ${people.map(p => `
          <div class="admin-item">
            ${avatarHTML(p, true)}
            <div class="admin-item-info">
              <div class="admin-item-name">${p.name} ${p.isMe ? '<span style="color:var(--violet);font-size:11px">(אדמין — אתה)</span>' : ''}</div>
              <div class="admin-item-sub">${p.email || 'ללא מייל'}</div>
            </div>
            <div class="admin-actions">
              ${!p.isMe ? `
                <button class="admin-btn" onclick="editPersonPrompt('${p.id}')" title="ערוך">✏️</button>
                <button class="admin-btn danger" onclick="deletePerson('${p.id}')" title="מחק">🗑</button>
              ` : ''}
            </div>
          </div>
        `).join("")}
        <div class="admin-add-row" style="flex-wrap:wrap;align-items:center">
          <input class="input" id="newPersonName" placeholder="שם…" style="min-width:100px">
          <input class="input" id="newPersonEmail" placeholder="מייל…" style="flex:1.5;min-width:140px">
          <input type="color" id="newPersonColor" value="#42B4E6" style="width:42px;height:36px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:none" title="בחר צבע חופשי">
          <button class="btn-primary" onclick="addPerson()" style="white-space:nowrap">+ הוסף</button>
        </div>
        <div style="padding:0 20px 12px;display:flex;gap:5px;flex-wrap:wrap">
          ${PRESET_COLORS.map(clr => `<div onclick="document.getElementById('newPersonColor').value='${clr}'" style="width:22px;height:22px;border-radius:5px;background:${clr};cursor:pointer;border:1px solid var(--border)" title="${clr}"></div>`).join("")}

      <!-- STATUSES -->
      <div class="card admin-section">
        <div class="admin-section-head">
          <div class="admin-section-title">🔄 סטטוסים</div>
          <span style="font-size:12px;color:var(--text-mute)">שם וצבע ניתנים לעריכה</span>
        </div>
        ${Object.entries(STATUS_MAP).map(([k, s]) => `
          <div class="admin-item">
            <div class="color-dot" style="background:${s.color}"></div>
            <div class="admin-item-info">
              <div class="admin-item-name">${s.label}</div>
              <div class="admin-item-sub">${tasks.filter(t => t.status === k).length} משימות</div>
            </div>
            <div class="admin-actions">
              <button class="admin-btn" onclick="editStatusPrompt('${k}')" title="ערוך">✏️</button>

        <div style="padding:12px 20px;font-size:12px;color:var(--text-mute);border-top:1px solid var(--border-soft)">

      <!-- PRIORITIES -->
      <div class="card admin-section">
        <div class="admin-section-head">
          <div class="admin-section-title">⚑ תיעדוף</div>
          <span style="font-size:12px;color:var(--text-mute)">שם וצבע ניתנים לעריכה</span>
        </div>
        ${Object.entries(PRIO_MAP).map(([k, p]) => `
          <div class="admin-item">
            <div class="color-dot" style="background:${p.color}"></div>
            <div class="admin-item-info">
              <div class="admin-item-name">${p.label}</div>
              <div class="admin-item-sub">${tasks.filter(t => t.prio === k).length} משימות</div>
            </div>
            <div class="admin-actions">
              <button class="admin-btn" onclick="editPrioPrompt('${k}')" title="ערוך">✏️</button>

          </div>
        `).join("")}
        <div style="padding:12px 20px;font-size:12px;color:var(--text-mute);border-top:1px solid var(--border-soft)">
          💡 ניתן לערוך שם וצבע. רמות התיעדוף (גבוה/בינוני/נמוך) קבועות.
        </div>
      </div>

      <!-- TEMPLATES -->
      <div class="card admin-section">
        <div class="admin-section-head">
          <div class="admin-section-title">📑 תבניות משימה</div>
          <span style="font-size:12px;color:var(--text-mute)">${templates.length} תבניות</span>
        </div>
        ${templates.length ? templates.map(t => `
          <div class="admin-item">
            <div class="color-dot" style="background:${getCat(t.cat).color}"></div>
            <div class="admin-item-info">
              <div class="admin-item-name">${t.name}</div>
              <div class="admin-item-sub">${getCat(t.cat).name} · ${(t.subtasks||[]).length} תתי-משימות</div>
            </div>
            <div class="admin-actions">
              <button class="admin-btn danger" onclick="deleteTemplate('${t.id}')" title="מחק">🗑</button>
            </div>
          </div>
        `).join("") : '<div style="padding:16px 20px;font-size:13px;color:var(--text-mute)">אין תבניות עדיין. צור משימה וסמן "שמור גם כתבנית".</div>'}
      </div>
    </div>

    <!-- SYSTEM INFO -->
    <div class="card admin-info-card" style="margin-top:20px">
      <div class="admin-section-title" style="margin-bottom:16px">📋 מידע מערכת</div>
      <div class="admin-info-row"><span class="admin-info-label">סך הכל משימות</span><span class="admin-info-val">${taskCount}</span></div>
      <div class="admin-info-row"><span class="admin-info-label">משימות שהושלמו</span><span class="admin-info-val">${doneCount} (${taskCount ? Math.round(doneCount/taskCount*100) : 0}%)</span></div>
      <div class="admin-info-row"><span class="admin-info-label">קטגוריות</span><span class="admin-info-val">${categories.length}</span></div>
      <div class="admin-info-row"><span class="admin-info-label">אנשים</span><span class="admin-info-val">${people.length}</span></div>
      <div class="admin-info-row"><span class="admin-info-label">אדמין</span><span class="admin-info-val">${currentUser?.displayName || currentUser?.email}</span></div>
      <div class="admin-info-row"><span class="admin-info-label">פרויקט Firebase</span><span class="admin-info-val">task-command-e573f</span></div>
      <div class="admin-info-row"><span class="admin-info-label">גרסה</span><span class="admin-info-val">1.0.0</span></div>
      <div style="margin-top:16px;display:flex;gap:8px">
        <button class="btn-outline" onclick="exportData()">📥 ייצוא נתונים (JSON)</button>
        <button class="btn-outline danger" style="color:var(--red);border-color:var(--red)" onclick="clearDoneConfirm()">🗑 מחק משימות שהושלמו</button>
      </div>
    </div>
  `;
}

/* --- Category CRUD --- */
async function addCat() {
  const name = document.getElementById("newCatName").value.trim();
  if (!name) return;
  const color = document.getElementById("newCatColor").value;
  const id = "c" + Date.now();
  await userDoc("categories").doc(id).set({ name, color, order: categories.length });
  categories.push({ id, name, color });
  updateCatSelect();
  showToast("✓ קטגוריה נוספה");
  renderView();
}

function editStatusPrompt(key) {
  const s = STATUS_MAP[key];
  showEditModal("עריכת סטטוס", s.label, s.color, "", false, async (name, color) => {
    STATUS_MAP[key].label = name; STATUS_MAP[key].color = color;
    await saveLabelConfig();
    showToast("✓ סטטוס עודכן"); renderView();
  });
}

function editPrioPrompt(key) {
  const p = PRIO_MAP[key];
  showEditModal("עריכת תיעדוף", p.label, p.color, "", false, async (name, color) => {
    PRIO_MAP[key].label = name; PRIO_MAP[key].color = color;
    await saveLabelConfig();
    showToast("✓ תיעדוף עודכן"); renderView();
  });
}

async function saveLabelConfig() {
  const status = {}; Object.keys(STATUS_MAP).forEach(k => status[k] = { label: STATUS_MAP[k].label, color: STATUS_MAP[k].color });
  const prio = {}; Object.keys(PRIO_MAP).forEach(k => prio[k] = { label: PRIO_MAP[k].label, color: PRIO_MAP[k].color });
  await userDoc("config").doc("labels").set({ status, prio });
}

async function deleteTemplate(id) {
  if (!confirm("למחוק את התבנית?")) return;
  await userDoc("templates").doc(id).delete();
  showToast("🗑 תבנית נמחקה");
}

function editCatPrompt(id) {
  const c = categories.find(x => x.id === id);
  if (!c) return;
  showEditModal("עריכת קטגוריה", c.name, c.color, "", false, (name, color) => updateCat(id, name, color));
}

function showEditModal(title, nameVal, colorVal, emailVal, showEmail, onSave) {
  const palette = PRESET_COLORS.map(clr =>
    `<div onclick="document.getElementById('editColorVal').value='${clr}'" class="clr-opt" style="width:26px;height:26px;border-radius:6px;background:${clr};cursor:pointer;border:1px solid var(--border)" title="${clr}"></div>`
  ).join("");
  
  const modal = document.createElement("div");
  modal.id = "editModal";
  modal.style.cssText = "position:fixed;inset:0;z-index:55;display:grid;place-items:center;background:var(--overlay);padding:16px";
  modal.innerHTML = `<div style="background:var(--surface);border-radius:20px;padding:24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);backdrop-filter:blur(20px)" onclick="event.stopPropagation()">
    <div style="font-weight:700;font-size:18px;margin-bottom:16px">${title}</div>
    <div class="field"><div class="field-label">שם</div><input class="input" id="editNameVal" value="${nameVal}"></div>
    ${showEmail ? `<div class="field"><div class="field-label">מייל</div><input class="input" id="editEmailVal" value="${emailVal}"></div>` : ''}
    <div class="field">
      <div class="field-label">צבע</div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
        <input type="color" id="editColorVal" value="${colorVal}" style="width:48px;height:40px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:none">
        <span style="font-size:13px;color:var(--text-mute)">בחר צבע חופשי או מהפלטה למטה</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${palette}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn-cancel" onclick="document.getElementById('editModal').remove()">ביטול</button>
      <button class="btn-submit" onclick="
        const n=document.getElementById('editNameVal').value.trim();
        if(!n)return;
        const c=document.getElementById('editColorVal').value;
        const e=document.getElementById('editEmailVal')?.value||'';
        document.getElementById('editModal').remove();
        window._editCb(n,c,e);
      ">שמור</button>
    </div>
  </div>`;
  modal.onclick = () => modal.remove();
  window._editCb = onSave;
  document.body.appendChild(modal);
}

async function updateCat(id, name, color) {
  await userDoc("categories").doc(id).update({ name, color });
  const c = categories.find(x => x.id === id);
  if (c) { c.name = name; c.color = color; }
  updateCatSelect();
  showToast("✓ קטגוריה עודכנה");
  renderView();
}

async function deleteCat(id) {
  const count = tasks.filter(t => t.cat === id).length;
  if (count > 0) { alert(`לא ניתן למחוק — יש ${count} משימות בקטגוריה הזו. העבר אותן קודם.`); return; }
  if (!confirm("למחוק את הקטגוריה?")) return;
  await userDoc("categories").doc(id).delete();
  categories = categories.filter(x => x.id !== id);
  updateCatSelect();
  showToast("🗑 קטגוריה נמחקה");
  renderView();
}

function updateCatSelect() {
  const sel = document.getElementById("addCat");
  if (sel) sel.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
}

/* --- People CRUD --- */
async function addPerson() {
  const name = document.getElementById("newPersonName").value.trim();
  if (!name) return;
  const email = document.getElementById("newPersonEmail").value.trim();
  const color = document.getElementById("newPersonColor").value;
  const initials = name.split(" ").map(w => w.charAt(0)).join("").slice(0, 2);
  const id = "p" + Date.now();
  const person = { name, email, initials, color, isMe: false };
  await userDoc("people").doc(id).set(person);
  people.push({ id, ...person });
  showToast("✓ איש קשר נוסף");
  renderView();
}

function editPersonPrompt(id) {
  const p = people.find(x => x.id === id);
  if (!p) return;
  showEditModal("עריכת איש קשר", p.name, p.color, p.email || "", true, (name, color, email) => {
    updatePerson(id, name, email);
    // Also update color
    userDoc("people").doc(id).update({ color });
    const pp = people.find(x => x.id === id);
    if (pp) pp.color = color;
  });
}

async function updatePerson(id, name, email) {
  const initials = name.split(" ").map(w => w.charAt(0)).join("").slice(0, 2);
  await userDoc("people").doc(id).update({ name, email, initials });
  const p = people.find(x => x.id === id);
  if (p) { p.name = name; p.email = email; p.initials = initials; }
  showToast("✓ איש קשר עודכן");
  renderView();
}

async function deletePerson(id) {
  const tagged = tasks.filter(t => (t.tags || []).includes(id)).length;
  if (tagged > 0 && !confirm(`האדם מתויג ב-${tagged} משימות. למחוק בכל זאת? (התיוג יישאר אבל לא יוצג)`)) return;
  if (tagged === 0 && !confirm("למחוק את איש הקשר?")) return;
  await userDoc("people").doc(id).delete();
  people = people.filter(x => x.id !== id);
  showToast("🗑 איש קשר נמחק");
  renderView();
}

/* --- Utilities --- */
function exportData() {
  const data = { tasks, categories, people, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `task-command-backup-${todayISO()}.json`;
  a.click();
  showToast("📥 הנתונים יוצאו בהצלחה");
}

async function clearDoneConfirm() {
  const done = tasks.filter(t => t.status === "done");
  if (!done.length) { showToast("אין משימות שהושלמו למחיקה"); return; }
  if (!confirm(`למחוק ${done.length} משימות שהושלמו? פעולה זו בלתי הפיכה.`)) return;
  for (const t of done) {
    await userDoc("tasks").doc(t.id).delete();
  }
  await logActivity("מחק משימות שהושלמו", `${done.length} משימות`);
  showToast(`🗑 ${done.length} משימות שהושלמו נמחקו`);
}

/* ============================================================
   INIT THEME — load saved preference
   ============================================================ */
try {
  const saved = localStorage.getItem("tc-theme");
  if (saved === "dark") {
    document.body.dataset.theme = "dark";
    document.getElementById("themeBtn").textContent = "☀️";
  }
} catch(e) {}

// Close user menu on outside click
document.addEventListener("click", e => {
  const menu = document.getElementById("userMenu");
  if (menu && !menu.classList.contains("hidden") && !e.target.closest("#userAvatar") && !e.target.closest("#userMenu")) {
    menu.classList.add("hidden");
  }
});
</script>
